<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>XenKithara - Modes & Scales</title>
    <link rel="stylesheet" href="../../css/master-style.css">
    <link rel="stylesheet" href="style.css">
    <script src="../../js/utils/modes.js"></script>
    <script src="../../js/core/theory-engine.js" defer></script>
    <script src="../../js/core/audio-manager.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="../../js/components/main-nav.js" defer></script>
    <script src="../../js/components/guitar-fretboard.js" type="module"></script>

    <link rel="icon" type="image/png" href="../../assets/icon.png" />

    <script src="script.js" defer></script>
</head>

<body>
    <main-nav active-tab="modes" root-path="../../"></main-nav>

    <div class="content">
        <div class="card">
            <guitar-fretboard
                strings="6"
                tuning="EADGBE"
                notes="C, E, G"
                width="900"
                height="300"
                is24edo="false"
                id="grid">
            </guitar-fretboard>
        </div>

        <div class="card">
            <table class="table-center" id="chord-table"></table>
        </div>
    </div>

    <footer>
    <div class="footer-toggle" id="toggle-footer">
        <i class="fa fa-chevron-down"></i>
    </div>
        <div class="notes card">
            <form id="form" onsubmit="return false;">
                <div id="checkbox-container">
                </div>

                <div class="controls-row">
                    <span>
                        <input type="checkbox" id="is24edoToggle" onclick="onEDOChange();">
                        <label for="is24edoToggle">24edo</label>
                    </span>
                    <select id="tune-select" onchange="writeTune()">
                        <option value="C" selected>C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="G">G</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                    </select>

                    <select id="alt-select" onchange="writeTune()">
                        <option value="#">#</option>
                        <option value="♮" selected>♮</option>
                        <option value="♭">♭</option>
                    </select>

                    <select id="mode-select" onchange="writeTune()">
                    </select>
                </div>

                <div class="controls-row">
                    <input type="number" id="string-number" value="6" onchange="changeStringCount()">
                    <select id="tuning-select" onchange="changeTuning()">
                        <option value="EADGBE" selected>Standard : EADGBE</option>
                        <option value="CGADGC">Arabic Oud : CGADGC</option>
                        <option value="DABEAD">Turkish Oud : DABEAD</option>
                        <option value="CUSTOM">Custom</option>
                    </select>

                    <input type="text" id="custom-tuning" placeholder="EADGBE" autocapitalize="characters"
                        onkeypress="onTuningChange();">
                </div>
            </form>
        </div>
    </footer>
</body>

</html>
